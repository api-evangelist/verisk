  - aid: verisk:underwriting-api
    name: Verisk UnderWriting API
    description: >-
      Verisk UnderWriting API provides personal and commercial lines insurance
      underwriting data including homeowner data, motor vehicle reports, A-PLUS
      auto and property reports, LightSpeed prefill, geocoding, ISO fire protection
      class, and coverage verification for P&C insurance carriers. Supports both
      JSON and XML response formats.
