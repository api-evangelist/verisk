aid: verisk
name: Verisk
description: >-
  Verisk (formerly ISO) is a leading data analytics and technology company serving
  the insurance, energy, and financial services industries. Verisk provides risk
  scoring, actuarial data, property analytics, catastrophe modeling, claims
  benchmarking, and underwriting intelligence through RESTful APIs that power
  insurance pricing, reserving, and exposure management workflows.
