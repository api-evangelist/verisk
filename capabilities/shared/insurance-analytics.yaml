naftiko: "1.0.0-alpha1"

info:
  label: "Verisk Insurance Analytics API"
  description: "Verisk property risk assessments, ISO fire protection class, catastrophe peril scores, insurance risk scoring, and claims benchmarking for P&C insurance carriers."
  tags:
    - Insurance
    - Analytics
    - Risk Management
    - Property Data
    - Catastrophe Modeling
    - Underwriting
    - Claims
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VERISK_BEARER_TOKEN: VERISK_BEARER_TOKEN
      VERISK_API_KEY: VERISK_API_KEY

capability:
  consumes:
    - type: http
      namespace: verisk-insurance-analytics
      baseUri: https://api.verisk.com/insurance/v1
      description: "Verisk Insurance Analytics REST API for property risk, peril scores, and claims benchmarking."
      authentication:
        type: bearer
        token: "{{VERISK_BEARER_TOKEN}}"
      resources:
        - name: property-risk
          path: /property/risk/{propertyId}
          description: "Property risk assessments and hazard scores"
          operations:
            - name: get-property-risk
              method: GET
              description: "Get comprehensive risk data for a specific property"
              inputParameters:
                - name: propertyId
                  in: path
                  type: string
                  required: true
                  description: "Property identifier (address or ISO property ID)"
                - name: includePerils
                  in: query
                  type: array
                  required: false
                  description: "Peril types to include in response"
                - name: asOfDate
                  in: query
                  type: string
                  required: false
                  description: "Historical risk assessment date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: property-lookup
          path: /property/lookup
          description: "Address-to-property resolution and risk data"
          operations:
            - name: lookup-property-by-address
              method: POST
              description: "Resolve a street address to a property record and return risk data"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  streetAddress: "{{tools.streetAddress}}"
                  city: "{{tools.city}}"
                  state: "{{tools.state}}"
                  zipCode: "{{tools.zipCode}}"
                  includeRiskData: "{{tools.includeRiskData}}"

        - name: risk-scores
          path: /risk/scores
          description: "Insurance risk scores for properties and portfolios"
          operations:
            - name: get-risk-scores
              method: POST
              description: "Get risk scores for properties, policies, or portfolios"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  locations: "{{tools.locations}}"
                  scoreTypes: "{{tools.scoreTypes}}"

        - name: fire-protection-class
          path: /risk/fire-protection-class
          description: "ISO Fire Protection Classification data"
          operations:
            - name: get-fire-protection-class
              method: GET
              description: "Get ISO Public Protection Classification (PPC) grade for a location"
              inputParameters:
                - name: latitude
                  in: query
                  type: number
                  required: true
                  description: "Location latitude"
                - name: longitude
                  in: query
                  type: number
                  required: true
                  description: "Location longitude"
                - name: constructionType
                  in: query
                  type: string
                  required: false
                  description: "ISO construction class"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: catastrophe-peril-scores
          path: /catastrophe/peril-scores
          description: "Catastrophe peril exposure scores"
          operations:
            - name: get-peril-scores
              method: POST
              description: "Get catastrophe exposure scores for natural hazard perils"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  locations: "{{tools.locations}}"
                  perils: "{{tools.perils}}"

        - name: claims-benchmarks
          path: /claims/benchmarks
          description: "Industry claims benchmarking data"
          operations:
            - name: get-claims-benchmarks
              method: GET
              description: "Get industry claims benchmarking data for loss frequency, severity, and combined ratio"
              inputParameters:
                - name: lineOfBusiness
                  in: query
                  type: string
                  required: true
                  description: "Line of insurance business"
                - name: state
                  in: query
                  type: string
                  required: false
                  description: "US state code"
                - name: year
                  in: query
                  type: integer
                  required: false
                  description: "Data year"
                - name: metricType
                  in: query
                  type: string
                  required: false
                  description: "Metric type to retrieve"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: verisk-insurance-analytics-rest
      resources:
        - path: /v1/property/risk/{propertyId}
          name: property-risk
          description: "Property risk assessment by property ID"
          operations:
            - method: GET
              name: get-property-risk
              description: "Get property risk assessment"
              call: "verisk-insurance-analytics.get-property-risk"
              with:
                propertyId: "rest.propertyId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/property/lookup
          name: property-lookup
          description: "Property lookup by address"
          operations:
            - method: POST
              name: lookup-property-by-address
              description: "Lookup property by address"
              call: "verisk-insurance-analytics.lookup-property-by-address"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/risk/scores
          name: risk-scores
          description: "Insurance risk scores"
          operations:
            - method: POST
              name: get-risk-scores
              description: "Get insurance risk scores"
              call: "verisk-insurance-analytics.get-risk-scores"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/risk/fire-protection-class
          name: fire-protection-class
          description: "ISO Fire Protection Class lookup"
          operations:
            - method: GET
              name: get-fire-protection-class
              description: "Get ISO Fire Protection Class"
              call: "verisk-insurance-analytics.get-fire-protection-class"
              with:
                latitude: "rest.latitude"
                longitude: "rest.longitude"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/catastrophe/peril-scores
          name: peril-scores
          description: "Catastrophe peril scores"
          operations:
            - method: POST
              name: get-peril-scores
              description: "Get catastrophe peril scores"
              call: "verisk-insurance-analytics.get-peril-scores"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/claims/benchmarks
          name: claims-benchmarks
          description: "Claims benchmarking data"
          operations:
            - method: GET
              name: get-claims-benchmarks
              description: "Get claims benchmarking data"
              call: "verisk-insurance-analytics.get-claims-benchmarks"
              with:
                lineOfBusiness: "rest.lineOfBusiness"
                state: "rest.state"
                year: "rest.year"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: verisk-insurance-analytics-mcp
      transport: http
      tools:
        - name: get-property-risk
          description: "Get comprehensive risk data for a specific property from Verisk"
          hints:
            readOnly: true
            openWorld: true
          call: "verisk-insurance-analytics.get-property-risk"
          with:
            propertyId: "tools.propertyId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: lookup-property-by-address
          description: "Resolve a street address to a Verisk property record with risk data"
          hints:
            readOnly: true
            openWorld: true
          call: "verisk-insurance-analytics.lookup-property-by-address"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-risk-scores
          description: "Get insurance risk scores for properties, policies, or portfolios from Verisk"
          hints:
            readOnly: true
            openWorld: true
          call: "verisk-insurance-analytics.get-risk-scores"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-fire-protection-class
          description: "Get ISO Public Protection Classification (PPC) grade for a location from Verisk"
          hints:
            readOnly: true
            openWorld: true
          call: "verisk-insurance-analytics.get-fire-protection-class"
          with:
            latitude: "tools.latitude"
            longitude: "tools.longitude"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-peril-scores
          description: "Get catastrophe exposure scores for natural hazard perils from Verisk"
          hints:
            readOnly: true
            openWorld: true
          call: "verisk-insurance-analytics.get-peril-scores"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-claims-benchmarks
          description: "Get industry claims benchmarking data for loss frequency, severity, and combined ratio from Verisk"
          hints:
            readOnly: true
            openWorld: true
          call: "verisk-insurance-analytics.get-claims-benchmarks"
          with:
            lineOfBusiness: "tools.lineOfBusiness"
            state: "tools.state"
            year: "tools.year"
          outputParameters:
            - type: object
              mapping: "$."
