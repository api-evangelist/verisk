  - https://www.verisk.com/
notes: No public pricing or billing API. Meters are not invented; reconciliation deferred pending customer-portal
  access.
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Verisk Data & Analytics
  ServiceCategory: Insurance Risk Analytics
