meters:
  - name: data_api_license
    description: Annual contractual license for Verisk data sets / APIs; sub-meters not publicly published.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Customers consume data via Verisk product portals and APIs; usage telemetry is exposed
      contractually rather than via a public cost API.
  - name: Allocation
    description: Allocation is contract-level (per line of business, geography, data set scope).
  - name: Optimization
    description: Optimization is scoping-driven (which data sets, geographies, and query volumes are
      licensed); renewal is the primary optimization checkpoint.
  - name: Accountability
    description: Accountability sits with the actuarial / underwriting / claims business owner; finance
      owns the annual subscription line.
