specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Verisk
providerId: verisk
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Insurance
  - Risk Analytics
  - Underwriting
  - Claims
description: Verisk sells insurance-risk analytics and data products (ISO, AIR, Xactware, etc.) under bilateral
  contract with regulated insurance customers. There is no public price list, no self-serve developer
  plan, and no published per-tier API quota pricing; data and API access are licensed on a contract
  basis.
sources:
  - https://www.verisk.com/
notes: Public-facing pricing pages were unavailable (homepage and `/products/` returned no usable content,
  `/contact-us/` returned 404). Verisk's commercial model is bilateral contract with insurance carriers
  and brokers; no developer self-service is published. Reconciliation to a single Contact Sales plan.
plans:
  - id: verisk-contact-sales
    name: Contact Sales
    type: enterprise
    description: Custom-quoted Verisk data / analytics / API license. Scope (lines of business, geography,
      data sets, query volume) drives price.
    entries:
      - label: Data / API License
        name: data_api_license
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: ISO Insurance Data
      - name: AIR Catastrophe Modeling
      - name: Xactware Property Estimating
      - name: API Access (bundled per contract)
maintainers:
